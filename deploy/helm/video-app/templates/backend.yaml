apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-backend
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "video-app.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "video-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z video-postgres 5432; do
                echo "Aguardando Postgres..."; sleep 2;
              done
        - name: migrate
          image: {{ include "video-app.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: video-app-env
      containers:
        - name: backend
          image: {{ include "video-app.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: video-app-env
          volumeMounts:
            - name: telegram-data
              mountPath: /app/telegram_data
            {{- if .Values.backend.localStorage.enabled }}
            - name: storage
              mountPath: /app/storage
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: telegram-data
          persistentVolumeClaim:
            claimName: video-telegram-data
        {{- if .Values.backend.localStorage.enabled }}
        - name: storage
          persistentVolumeClaim:
            claimName: video-local-storage
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: video-backend
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: {{ include "video-app.name" . }}
    app.kubernetes.io/component: backend
