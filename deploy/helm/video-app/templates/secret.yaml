apiVersion: v1
kind: Secret
metadata:
  name: video-app-env
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "video-app.databaseUrl" . | quote }}
  SYNC_DATABASE_URL: {{ include "video-app.syncDatabaseUrl" . | quote }}
  SECRET_KEY: {{ .Values.config.secretKey | quote }}

  # Storage local
  STORAGE_DIR: "/app/storage"
  STORAGE_TOTAL_GB: {{ .Values.config.storageTotalGb | quote }}

  # OpenAI
  OPENAI_API_KEY: {{ .Values.config.openai.apiKey | quote }}

  # Telegram
  TELEGRAM_API_ID: {{ .Values.config.telegram.apiId | quote }}
  TELEGRAM_API_HASH: {{ .Values.config.telegram.apiHash | quote }}
  TELEGRAM_PHONE: {{ .Values.config.telegram.phone | quote }}
  TELEGRAM_SESSION_PATH: "/app/telegram_data/session"

  # Compressão
  VIDEO_COMPRESS_ENABLED: {{ .Values.videoCompress.enabled | quote }}
  VIDEO_COMPRESS_CODEC: {{ .Values.videoCompress.codec | quote }}
  VIDEO_COMPRESS_CRF: {{ .Values.videoCompress.crf | quote }}
  VIDEO_COMPRESS_PRESET: {{ .Values.videoCompress.preset | quote }}
  VIDEO_AUDIO_BITRATE: {{ .Values.videoCompress.audioBitrate | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: video-postgres-credentials
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.config.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.config.database.password | quote }}
  POSTGRES_DB: {{ .Values.config.database.name | quote }}
