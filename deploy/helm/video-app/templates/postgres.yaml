{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: video-postgres
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: {{ include "video-app.name" . }}
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: video-postgres
  namespace: {{ include "video-app.namespace" . }}
  labels:
    {{- include "video-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: video-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "video-app.name" . }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "video-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: video-postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.config.database.user }}", "-d", "{{ .Values.config.database.name }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.config.database.user }}", "-d", "{{ .Values.config.database.name }}"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storage.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
