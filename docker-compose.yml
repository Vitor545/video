services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: devops_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://devops:devops@db:5432/devops_platform
      SYNC_DATABASE_URL: postgresql+psycopg2://devops:devops@db:5432/devops_platform
      SECRET_KEY: super-secret-change-in-production
      # Telegram + IA (M2)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE}
      TELEGRAM_SESSION_PATH: /app/telegram_data/session
      # Storage local
      STORAGE_DIR: /app/storage
      STORAGE_TOTAL_GB: ${STORAGE_TOTAL_GB:-200}
      # Compressão de vídeo
      VIDEO_COMPRESS_ENABLED: ${VIDEO_COMPRESS_ENABLED:-true}
      VIDEO_COMPRESS_CODEC: ${VIDEO_COMPRESS_CODEC:-libx264}
      VIDEO_COMPRESS_CRF: ${VIDEO_COMPRESS_CRF:-28}
      VIDEO_COMPRESS_PRESET: ${VIDEO_COMPRESS_PRESET:-medium}
      VIDEO_AUDIO_BITRATE: ${VIDEO_AUDIO_BITRATE:-96k}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - telegram_data:/app/telegram_data
      - storage:/app/storage
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      DOCKER: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
  telegram_data:
  storage:
  frontend_node_modules:
